[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://maps.googleapis.com https://maps.gstatic.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://maps.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://www.slant.co; img-src 'self' data: https:; connect-src 'self' https://xpxbldyrigqjkdmrfhvh.supabase.co https://api.resend.com https://api.thecourierguy.co.za https://api.portal.thecourierguy.co.za https://places.googleapis.com https://maps.googleapis.com; frame-src 'self' https://www.payfast.co.za https://sandbox.payfast.co.za; base-uri 'self'"
