<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>enTheos · Slide 4</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; overflow:hidden; background:#020c1a; }

  .card {
    width:1080px; height:1080px;
    background:#020c1a;
    display:flex; flex-direction:column;
    justify-content:center;
    padding:100px 96px;
    position:relative;
  }

  /* Yellow left border accent */
  .left-accent {
    position:absolute; top:0; left:0;
    width:8px; height:100%;
    background:#E1FF01;
  }

  /* Top right small logo */
  .logo-wrap {
    position:absolute; top:56px; right:72px;
  }
  .logo-wrap img {
    width:120px;
    filter:brightness(0) invert(1);
    opacity:0.15;
  }

  .quote-mark {
    font-family:'Bebas Neue',sans-serif;
    font-size:160px; line-height:0.7;
    color:#E1FF01; opacity:0.15;
    margin-bottom:-32px;
  }

  .quote {
    font-family:'Bebas Neue',sans-serif;
    font-size:80px; line-height:0.92;
    color:#F2F2F2; letter-spacing:0.02em;
    margin-bottom:48px;
  }
  .quote em { color:#E1FF01; font-style:normal; }

  .attribution {
    font-family:'Barlow Condensed',sans-serif;
    font-size:16px; font-weight:700;
    letter-spacing:0.28em; text-transform:uppercase;
    color:#F2F2F2; opacity:0.3;
    display:flex; align-items:center; gap:12px;
    margin-bottom:64px;
  }
  .attribution::before { content:'—'; opacity:0.4; }

  .divider {
    width:80px; height:1px;
    background:rgba(242,242,242,0.1);
    margin-bottom:48px;
  }

  .bottom-copy {
    font-family:'Barlow Condensed',sans-serif;
    font-size:20px;
    letter-spacing:0.06em;
    color:#F2F2F2; opacity:0.4;
    line-height:1.6;
    max-width:680px;
  }

  .url {
    position:absolute; bottom:56px; right:72px;
    font-family:'DM Mono',monospace;
    font-size:12px; letter-spacing:0.1em;
    color:#0FA8DF; opacity:0.35;
  }
</style>
</head>
<body>
<div class="card">
  <div class="left-accent"></div>

  <div class="logo-wrap">
    <img src="../../images/entheos.png" alt="enTheos">
  </div>

  <div class="quote-mark">"</div>

  <div class="quote">
    Excellence is<br>
    an act of<br>
    <em>worship.</em>
  </div>

  <div class="attribution">Artifacts Coffee · Our why</div>

  <div class="divider"></div>

  <div class="bottom-copy">
    This word lives on every bag we roast. Not as a product. Not as a campaign. As a reminder — that the work we do here carries weight beyond the cup.
  </div>

  <div class="url">artifactscoffee.co.za</div>
</div>
</body>
</html>
