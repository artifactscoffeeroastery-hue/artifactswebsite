<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>80g · Slide 4</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; overflow:hidden; background:#020c1a; }

  .card {
    width:1080px; height:1080px;
    background:#020c1a;
    display:flex; flex-direction:column;
    position:relative;
  }

  /* Product image — full width, top portion */
  .images {
    height:600px;
    position:relative;
    overflow:hidden;
  }
  .images img {
    width:100%; height:100%;
    object-fit:cover;
    object-position:center 55%;
    filter:saturate(0.85) brightness(0.85);
  }
  /* Same vignette approach as slide 1 — only bottom 50%, no heavy dark cap */
  .images::after {
    content:'';
    position:absolute; bottom:0; left:0; right:0;
    height:50%;
    background:linear-gradient(to top, rgba(2,12,26,0.92) 0%, transparent 100%);
  }

  /* Bottom CTA section */
  .cta {
    flex:1;
    background:#020c1a;
    display:flex; flex-direction:column;
    justify-content:center;
    padding:40px 72px;
    position:relative;
  }

  .cta-top {
    display:flex; justify-content:space-between;
    align-items:flex-start; margin-bottom:20px;
  }

  .headline {
    font-family:'Bebas Neue',sans-serif;
    font-size:64px; line-height:0.88;
    color:#F2F2F2;
  }
  .headline em { color:#E1FF01; font-style:normal; }

  .price-stack {
    text-align:right;
  }
  .price-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:700;
    letter-spacing:0.24em; text-transform:uppercase;
    color:#F2F2F2; opacity:0.3; margin-bottom:4px;
  }
  .price {
    font-family:'Bebas Neue',sans-serif;
    font-size:72px; line-height:1;
    color:#E1FF01;
  }

  .meta {
    display:flex; gap:16px; flex-wrap:wrap;
    margin-bottom:20px;
  }
  .m {
    font-family:'Barlow Condensed',sans-serif;
    font-size:13px; font-weight:700;
    letter-spacing:0.16em; text-transform:uppercase;
    color:#F2F2F2; opacity:0.3;
    display:flex; align-items:center; gap:8px;
  }
  .m::before { content:'·'; opacity:0.3; }

  .bottom-row {
    display:flex; justify-content:space-between; align-items:center;
  }
  .url {
    font-family:'DM Mono',monospace;
    font-size:13px; letter-spacing:0.1em;
    color:#0FA8DF; opacity:0.45;
  }
  .promo {
    font-family:'DM Mono',monospace;
    font-size:12px; letter-spacing:0.12em;
    color:#E1FF01; opacity:0.45;
    border:1px solid rgba(225,255,1,0.2);
    padding:5px 14px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="images">
    <img src="../../images/dp-1080.png" alt="Origin Discovery Pack — three 80g bags">
  </div>

  <div class="cta">
    <div class="cta-top">
      <div class="headline">Try all <em>three.<br></em>R170. Done.</div>
      <div class="price-stack">
        <div class="price-label">Discovery Pack</div>
        <div class="price">R170</div>
      </div>
    </div>
    <div class="meta">
      <div class="m">3 × 80g whole bean</div>
      <div class="m">All washed process</div>
      <div class="m">Roasted fresh on dispatch</div>
    </div>
    <div class="bottom-row">
      <div class="url">artifactscoffee.co.za</div>
      <div class="promo">FOUNDER20 — 20% off</div>
    </div>
  </div>
</div>
</body>
</html>
