<svg viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#0a0a0a;">
<title>Artifacts Coffee – End-to-End Order Flow</title>

<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
  </marker>
  <marker id="arr-y" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#b8cc00"/>
  </marker>
</defs>

<!-- ── TITLE ── -->
<text x="34" y="36" font-size="18" fill="#e1ff01" font-family="'Courier New',monospace" font-weight="700" letter-spacing="0.06em">ARTIFACTS COFFEE</text>
<text x="34" y="52" font-size="10" fill="#555" font-family="'Courier New',monospace" letter-spacing="0.12em">END-TO-END ORDER FLOW</text>

<!-- ── SWIM LANE LABELS ── -->
<text x="14" y="115" font-size="9" fill="#444" font-family="'Courier New',monospace" writing-mode="tb" letter-spacing="0.1em">USER</text>
<line x1="34" y1="70" x2="34" y2="320" stroke="#1e1e1e" stroke-width="1"/>
<text x="14" y="395" font-size="9" fill="#444" font-family="'Courier New',monospace" writing-mode="tb" letter-spacing="0.1em">SYSTEM</text>
<line x1="34" y1="330" x2="34" y2="590" stroke="#1e1e1e" stroke-width="1"/>

<!-- ── LANE DIVIDER ── -->
<line x1="34" y1="328" x2="646" y2="328" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="340" y="324" font-size="9" fill="#333" font-family="'Courier New',monospace" text-anchor="middle" letter-spacing="0.1em">— — — — — — — — — — — — — — — — —</text>

<!-- ══ ROW 1: USER STEPS ══ -->

<!-- 1. Land -->
<rect x="44" y="76" width="96" height="48" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
<text x="92" y="96" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">LAND</text>
<text x="92" y="110" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">artifactscoffee.co.za</text>
<line x1="140" y1="100" x2="160" y2="100" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

<!-- 2. Browse -->
<rect x="160" y="76" width="96" height="48" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
<text x="208" y="93" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">BROWSE</text>
<text x="208" y="107" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">pick size · add</text>
<text x="208" y="119" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">to cart</text>
<line x1="256" y1="100" x2="276" y2="100" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

<!-- 3. Identify -->
<rect x="276" y="76" width="96" height="48" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
<text x="324" y="93" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">IDENTIFY</text>
<text x="324" y="107" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">name + email</text>
<text x="324" y="119" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">guest checkout</text>
<line x1="372" y1="100" x2="392" y2="100" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

<!-- 4. Address -->
<rect x="392" y="76" width="96" height="48" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
<text x="440" y="93" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">ADDRESS</text>
<text x="440" y="107" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">Google Places</text>
<text x="440" y="119" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">autocomplete</text>
<line x1="488" y1="100" x2="508" y2="100" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

<!-- 5. Courier -->
<rect x="508" y="76" width="112" height="48" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
<text x="564" y="93" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">COURIER</text>
<text x="564" y="107" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">TCG · Fastway</text>
<text x="564" y="119" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">live rates</text>

<!-- Arrow down from courier -->
<line x1="564" y1="124" x2="564" y2="164" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

<!-- ══ ROW 2: DISCOUNT + PAY ══ -->

<!-- Discount optional -->
<rect x="392" y="164" width="96" height="44" rx="4" fill="#111" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="4,2"/>
<text x="440" y="181" font-size="10" fill="#555" font-family="'Courier New',monospace" text-anchor="middle">DISCOUNT</text>
<text x="440" y="195" font-size="9" fill="#444" font-family="'Courier New',monospace" text-anchor="middle">FOUNDER20 (opt.)</text>
<text x="440" y="207" font-size="9" fill="#444" font-family="'Courier New',monospace" text-anchor="middle">R20 off</text>
<!-- dashed arrow -->
<line x1="508" y1="186" x2="488" y2="186" stroke="#333" stroke-width="0.75" stroke-dasharray="3,2" marker-end="url(#arr)"/>

<!-- Pay -->
<rect x="508" y="164" width="112" height="44" rx="4" fill="#0d1a0d" stroke="#1e4020" stroke-width="1.5"/>
<text x="564" y="181" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">PAY</text>
<text x="564" y="195" font-size="9" fill="#7aab88" font-family="'Courier New',monospace" text-anchor="middle">PayFast form</text>
<text x="564" y="207" font-size="9" fill="#7aab88" font-family="'Courier New',monospace" text-anchor="middle">cart total incl. ship</text>

<!-- Arrow user → PayFast gateway -->
<line x1="564" y1="208" x2="564" y2="258" stroke="#b8cc00" stroke-width="1.5" marker-end="url(#arr-y)"/>

<!-- ── GATEWAY LABEL ── -->
<text x="340" y="256" font-size="9" fill="#444" font-family="'Courier New',monospace" text-anchor="middle" letter-spacing="0.1em">PAYFAST GATEWAY</text>

<!-- ══ ROW 3: PAYFAST ══ -->
<rect x="430" y="260" width="190" height="44" rx="4" fill="#0a150a" stroke="#1e4020" stroke-width="1"/>
<text x="525" y="278" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">PAYFAST</text>
<text x="525" y="293" font-size="9" fill="#7aab88" font-family="'Courier New',monospace" text-anchor="middle">card / instant EFT / SnapScan</text>
<line x1="430" y1="282" x2="370" y2="282" stroke="#b8cc00" stroke-width="1.5" marker-end="url(#arr-y)"/>
<text x="399" y="276" font-size="9" fill="#888" font-family="'Courier New',monospace" text-anchor="middle">ITN</text>

<!-- ══ SYSTEM ROW ══ -->

<!-- Verify -->
<rect x="256" y="260" width="114" height="44" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
<text x="313" y="278" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">VERIFY</text>
<text x="313" y="293" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">payfast-notify fn</text>
<line x1="313" y1="304" x2="313" y2="360" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
<line x1="256" y1="282" x2="186" y2="282" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

<!-- Supabase -->
<rect x="56" y="260" width="130" height="44" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
<text x="121" y="278" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">RECORD</text>
<text x="121" y="293" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">Supabase orders</text>
<line x1="121" y1="304" x2="121" y2="360" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

<!-- Resend Email -->
<rect x="56" y="360" width="130" height="44" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
<text x="121" y="378" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">NOTIFY</text>
<text x="121" y="393" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">Resend order receipt</text>

<!-- Brew Circle -->
<rect x="230" y="360" width="130" height="44" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
<text x="295" y="378" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">BREW CIRCLE</text>
<text x="295" y="393" font-size="9" fill="#666" font-family="'Courier New',monospace" text-anchor="middle">loyalty pts logged</text>
<line x1="313" y1="360" x2="295" y2="360" stroke="#333" stroke-width="0.75" stroke-dasharray="3,2"/>

<!-- Order confirmed (user) -->
<rect x="56" y="440" width="130" height="44" rx="4" fill="#0d1a0d" stroke="#1e4020" stroke-width="1.5"/>
<text x="121" y="458" font-size="10" fill="#e1ff01" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700">CONFIRMED</text>
<text x="121" y="473" font-size="9" fill="#7aab88" font-family="'Courier New',monospace" text-anchor="middle">receipt in inbox</text>
<line x1="121" y1="404" x2="121" y2="440" stroke="#b8cc00" stroke-width="1.5" marker-end="url(#arr-y)"/>

<!-- ── STACK LEGEND ── -->
<rect x="44" y="510" width="576" height="56" rx="4" fill="#0e0e0e" stroke="#1e1e1e" stroke-width="0.5"/>
<text x="60" y="528" font-size="9" fill="#444" font-family="'Courier New',monospace" letter-spacing="0.1em">STACK</text>
<line x1="60" y1="533" x2="604" y2="533" stroke="#1e1e1e" stroke-width="0.5"/>
<text x="60" y="548" font-size="9" fill="#555" font-family="'Courier New',monospace">Frontend  HTML · CSS · Vanilla JS · Service Worker (cache v3)</text>
<text x="60" y="560" font-size="9" fill="#555" font-family="'Courier New',monospace">Backend   Netlify Functions (Node) · Supabase (Postgres) · PayFast ITN · TCG + Fastway APIs · Google Places · Resend</text>
</svg>
