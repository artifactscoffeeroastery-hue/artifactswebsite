<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>NI · Rajuanse Estates — Artifacts Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #020c1a;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1080px;
    background: #020c1a;
    display: flex;
    flex-direction: column;
    padding: 72px 80px 64px;
    position: relative;
    border: 1px solid #1E1E1E;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
  }

  .brand-mark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #F2F2F2;
    opacity: 0.35;
  }

  .code-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: #F2F2F2;
    opacity: 0.3;
    border: 1px solid rgba(242,242,242,0.15);
    padding: 4px 12px;
  }

  .country {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #F2F2F2;
    opacity: 0.4;
    margin-bottom: 12px;
  }

  .origin-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    line-height: 0.88;
    letter-spacing: 0.02em;
    color: #F2F2F2;
    margin-bottom: 20px;
  }

  .process {
    font-family: 'Barlow Condensed', sans-serif;
    font-style: italic;
    font-weight: 400;
    font-size: 20px;
    letter-spacing: 0.1em;
    color: #F2F2F2;
    opacity: 0.35;
    margin-bottom: 40px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(242, 242, 242, 0.1);
    margin-bottom: 40px;
  }

  .notes-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: #F2F2F2;
    opacity: 0.3;
    margin-bottom: 18px;
  }

  .notes {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 34px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #F2F2F2;
    line-height: 1.35;
  }

  .dot {
    opacity: 0.3;
    margin: 0 10px;
  }

  .bottom {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .origin-detail {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .detail-line {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #F2F2F2;
    opacity: 0.3;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .detail-line::before {
    content: '';
    width: 18px;
    height: 1px;
    background: rgba(242,242,242,0.2);
    flex-shrink: 0;
  }

  .price-block {
    text-align: right;
  }

  .price-from {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #F2F2F2;
    opacity: 0.3;
    margin-bottom: 4px;
  }

  .price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 1;
    color: #F2F2F2;
    letter-spacing: 0.02em;
    opacity: 0.85;
  }

  .price-currency {
    font-size: 32px;
    vertical-align: super;
    line-height: 0;
  }

  /* White accent stripe for NI */
  .accent-stripe {
    position: absolute;
    top: 0;
    left: 0;
    width: 10px;
    height: 100%;
    background: #F2F2F2;
    opacity: 0.6;
  }

  .flavour-swatches {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .swatch {
    height: 6px;
    border-radius: 3px;
    background: rgba(242,242,242,0.1);
    flex: 1;
  }

  .swatch.active {
    background: rgba(242,242,242,0.4);
  }

  .website {
    position: absolute;
    bottom: 30px;
    right: 80px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #F2F2F2;
    opacity: 0.2;
  }

  /* "Everyday" badge */
  .everyday-tag {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #020c1a;
    background: #F2F2F2;
    padding: 4px 14px;
    margin-bottom: 14px;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="card">
  <div class="accent-stripe"></div>

  <div class="top-bar">
    <span class="brand-mark">Artifacts Coffee</span>
    <span class="code-badge">NI · 003</span>
  </div>

  <div class="everyday-tag">The Everyday Cup</div>
  <div class="country">Nicaragua</div>

  <div class="origin-name">Rajuanse<br>Estates</div>

  <div class="process">Washed process · Single family estate</div>

  <div class="divider"></div>

  <div class="notes-label">Tasting Notes</div>
  <div class="notes">
    Chocolate<span class="dot">·</span>Caramel<br>
    <span style="opacity:0.65">Hazelnut</span>
  </div>

  <div class="flavour-swatches">
    <div class="swatch active"></div>
    <div class="swatch active"></div>
    <div class="swatch active"></div>
    <div class="swatch"></div>
    <div class="swatch"></div>
    <div class="swatch"></div>
  </div>

  <div class="bottom" style="margin-top: 48px;">
    <div class="origin-detail">
      <div class="detail-line">Nueva Segovia · Nicaragua</div>
      <div class="detail-line">Volcanic soil · Mountain terrain</div>
      <div class="detail-line">Generations of family farming</div>
    </div>
    <div class="price-block">
      <div class="price-from">From</div>
      <div class="price"><span class="price-currency">R</span>140</div>
    </div>
  </div>

  <div class="website">artifactscoffee.co.za</div>
</div>
</body>
</html>
