<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>MX · Ki Saya — Artifacts Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #E1FF01;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1080px;
    background: #E1FF01;
    display: flex;
    flex-direction: column;
    padding: 72px 80px 64px;
    position: relative;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
  }

  .brand-mark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #020c1a;
    opacity: 0.45;
  }

  .code-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: #020c1a;
    opacity: 0.4;
    border: 1px solid rgba(2,12,26,0.25);
    padding: 4px 12px;
  }

  .organic-pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #020c1a;
    border: 1.5px solid #020c1a;
    padding: 3px 14px;
    display: inline-block;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  .country {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #020c1a;
    opacity: 0.55;
    margin-bottom: 12px;
  }

  .origin-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 180px;
    line-height: 0.85;
    letter-spacing: 0.02em;
    color: #020c1a;
    margin-bottom: 20px;
  }

  .process {
    font-family: 'Barlow Condensed', sans-serif;
    font-style: italic;
    font-weight: 400;
    font-size: 20px;
    letter-spacing: 0.1em;
    color: #020c1a;
    opacity: 0.5;
    margin-bottom: 40px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(2, 12, 26, 0.2);
    margin-bottom: 40px;
  }

  .notes-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: #020c1a;
    opacity: 0.4;
    margin-bottom: 18px;
  }

  .notes {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #020c1a;
    line-height: 1.35;
  }

  .dot {
    opacity: 0.35;
    margin: 0 10px;
  }

  .bottom {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .origin-detail {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .detail-line {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #020c1a;
    opacity: 0.45;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .detail-line::before {
    content: '';
    width: 18px;
    height: 1px;
    background: rgba(2,12,26,0.35);
    flex-shrink: 0;
  }

  .price-block {
    text-align: right;
  }

  .price-from {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #020c1a;
    opacity: 0.4;
    margin-bottom: 4px;
  }

  .price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 1;
    color: #020c1a;
    letter-spacing: 0.02em;
  }

  .price-currency {
    font-size: 32px;
    vertical-align: super;
    line-height: 0;
  }

  /* Accent stripe — dark for MX (it's all yellow, use black) */
  .accent-stripe {
    position: absolute;
    top: 0;
    left: 0;
    width: 10px;
    height: 100%;
    background: #020c1a;
  }

  .flavour-swatches {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .swatch {
    height: 6px;
    border-radius: 3px;
    background: rgba(2,12,26,0.18);
    flex: 1;
  }

  .swatch.active {
    background: #020c1a;
    opacity: 0.5;
  }

  .website {
    position: absolute;
    bottom: 30px;
    right: 80px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #020c1a;
    opacity: 0.3;
  }

  /* Tzeltal meaning tag */
  .meaning-tag {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #020c1a;
    opacity: 0.35;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="accent-stripe"></div>

  <div class="top-bar">
    <span class="brand-mark">Artifacts Coffee</span>
    <span class="code-badge">MX · 002</span>
  </div>

  <div class="meaning-tag">"Ki Saya" — good work · Tzeltal</div>
  <div class="country">Mexico</div>
  <div class="origin-name">Ki<br>Saya</div>

  <div style="display:flex;align-items:center;gap:16px;margin-bottom:40px;">
    <div class="process" style="margin-bottom:0">Washed process</div>
    <div class="organic-pill">Certified Organic</div>
  </div>

  <div class="divider"></div>

  <div class="notes-label">Tasting Notes</div>
  <div class="notes">
    Caramel<span class="dot">·</span>Chocolate<br>
    <span style="opacity:0.7">Soft Citrus<span class="dot">·</span>Clean Finish</span>
  </div>

  <div class="flavour-swatches">
    <div class="swatch active"></div>
    <div class="swatch active"></div>
    <div class="swatch active"></div>
    <div class="swatch active"></div>
    <div class="swatch active"></div>
    <div class="swatch"></div>
  </div>

  <div class="bottom" style="margin-top: 40px;">
    <div class="origin-detail">
      <div class="detail-line">Sierra Madre de Chiapas</div>
      <div class="detail-line">Volcanic soil · Shade-covered</div>
      <div class="detail-line">Indigenous farmers · No chemicals</div>
    </div>
    <div class="price-block">
      <div class="price-from">From</div>
      <div class="price"><span class="price-currency">R</span>148</div>
    </div>
  </div>

  <div class="website">artifactscoffee.co.za</div>
</div>
</body>
</html>
